<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Vygo logo color</title>
  <desc id="desc">Clean horizontal Vygo vector logo with truck, road symbol, wordmark and payoff.</desc>
  <defs>
    <style>
      .navy { fill: #12232c; }
      .charcoal { fill: #46555d; }
      .cyan { fill: #13c7df; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <g id="mark" transform="translate(60 58)">
    <path class="cyan" d="M3 222c79-78 177-113 296-104 42 3 83 12 123 27-91-3-171 9-239 36-61 24-111 57-151 100H3z"/>
    <path class="cyan" d="M33 161c78-45 162-59 251-42 30 6 61 15 91 28-81-8-153-1-216 20-49 17-91 40-126 69l-30-44c9-11 19-21 30-31z"/>
    <path class="charcoal" d="M72 72h190c52 0 94 15 126 46 30 29 50 70 58 123h-60c-8-33-23-59-45-77-21-17-49-26-84-26H72V72z"/>
    <path class="navy" d="M105 39h155c58 0 105 16 140 49 22 21 38 47 49 79l-71-17c-25-39-64-58-118-58H150L105 39z"/>
    <path class="white" d="M250 91h49c36 0 66 15 89 46l-119-17-19-29z"/>
    <path class="navy" d="M71 135h205c53 0 94 16 124 48l-333-54 4 6z"/>
    <path class="charcoal" d="M71 188c56-18 120-23 190-14 36 5 72 13 108 25-107 7-195 34-264 82H71v-93z"/>
    <circle class="navy" cx="332" cy="250" r="27"/>
    <circle class="white" cx="332" cy="250" r="11"/>
    <circle class="navy" cx="178" cy="250" r="27"/>
    <circle class="white" cx="178" cy="250" r="11"/>
  </g>

  <g id="wordmark" transform="translate(505 82)">
    <text x="0" y="132" font-family="Avenir Next, Montserrat, Arial, sans-serif" font-size="162" font-weight="800" letter-spacing="-7">
      <tspan class="charcoal">V</tspan><tspan class="cyan">y</tspan><tspan class="charcoal">go</tspan>
    </text>
    <text x="17" y="212" font-family="Avenir Next, Montserrat, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="4">
      <tspan class="cyan">Move.</tspan>
    </text>
    <text x="156" y="212" font-family="Avenir Next, Montserrat, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="4">
      <tspan class="charcoal">Manage.</tspan>
    </text>
    <text x="367" y="212" font-family="Avenir Next, Montserrat, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="4">
      <tspan class="cyan">Succeed.</tspan>
    </text>
  </g>
</svg>
